
[[llm_api]]
    name="deepseek"
    model="chat"
    base_url="https://api.deepseek.com/v1"
    temperature = 0.2
    extra_body = { top_p = 0.95 }
    # 密钥直写（勿提交真实值）；与 api_key_env 二选一即可
    api_key = ""
    # 从「用户/系统环境变量」取值：此处填变量名（如 DEEPSEEK_API_KEY），运行时读取 process.env[该名]。
    # 若 api_key_env 非空，建议实现为优先于 api_key，避免把密钥写进仓库。
    api_key_env = "DEEPSEEK_API_KEY"

[[llm_api]]
    name="openai"
    model="chat"
    base_url="https://api.deepseek.com/v1"
    api_key = ""
    api_key_env = "OPENAI_API_KEY"

[promptpile]
    dir = './message'
    output = './message/promptpile-example-output.md'
    quiet = false
    after_hook = './after_hook.sh'
    tool_choice = 'auto'
    # 工具定义文件：仅 .toml，路径相对扫描目录根；文件内可写 extends = ["./base-tools.toml"]
    tools_file = './.tools.toml'
    disable_tool = false
    continue = false
    input = true
    insert_files = './inject.system.md'
    # append_files = './tail.user.md'
    missing_tool_results = 'warn' # warn | error | ignore

    # 从定义的 llm_api 里选
    llm_api = 'deepseek' 

    # 或者直接设置，这种方式的优先级更高，如果同时设置 llm_api 可以 override 部分参数
    llm_api_key = ''
    # 与 llm_api_key 二选一或并存：填「另一个环境变量」的名称，从用户/系统环境中取密钥（如 MY_PROMPTPILE_KEY）。
    # 若 llm_api_key_env 非空，建议实现为覆盖直写 llm_api_key（不在配置文件里落明文）。
    llm_api_key_env = ''
    llm_api_model= ''
    llm_api_base_url=''
    # 省略时默认 0.8；可覆盖 [[llm_api]] 中 profile 的 temperature
    llm_api_temperature = 0.8
    llm_api_extra_body = { top_p = 0.9 }

    